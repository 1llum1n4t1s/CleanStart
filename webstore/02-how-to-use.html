<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 800px;
    background: linear-gradient(135deg, #E0F2FE 0%, #BAE6FD 50%, #7DD3FC 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif;
    overflow: hidden;
  }
  .container {
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 48px;
  }
  .heading {
    font-size: 48px; font-weight: 800;
    color: #0C4A6E;
  }
  .steps {
    display: flex; gap: 40px;
  }
  .step {
    width: 280px;
    background: rgba(255,255,255, 0.9);
    border-radius: 20px;
    padding: 36px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .step-number {
    width: 48px; height: 48px;
    background: #0EA5E9;
    color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 800;
  }
  .step-icon { font-size: 48px; }
  .step-title {
    font-size: 22px; font-weight: 700;
    color: #0C4A6E;
  }
  .step-desc {
    font-size: 16px; color: #075985;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="heading">かんたん 3 ステップ</div>
    <div class="steps">
      <div class="step">
        <div class="step-number">1</div>
        <div class="step-icon">☑️</div>
        <div class="step-title">削除対象を選ぶ</div>
        <div class="step-desc">履歴、キャッシュ、Cookie など<br>消したい項目をチェック</div>
      </div>
      <div class="step">
        <div class="step-number">2</div>
        <div class="step-icon">⏱️</div>
        <div class="step-title">期間を指定</div>
        <div class="step-desc">1時間以内〜すべての期間まで<br>細かく選択可能</div>
      </div>
      <div class="step">
        <div class="step-number">3</div>
        <div class="step-icon">🧹</div>
        <div class="step-title">2回タップで削除</div>
        <div class="step-desc">誤操作防止の確認ステップ後<br>一括クリーンアップ</div>
      </div>
    </div>
  </div>
</body>
</html>
