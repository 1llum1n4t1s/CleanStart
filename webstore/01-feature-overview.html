<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 800px;
    background: linear-gradient(135deg, #DBEAFE 0%, #CCEEF0 50%, #A7F3D0 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif;
    overflow: hidden;
  }
  .container {
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 40px;
  }
  .icon-area {
    display: flex; align-items: center; gap: 32px;
  }
  .icon-box {
    width: 160px; height: 160px;
    background: white;
    border-radius: 32px;
    box-shadow: 0 12px 40px rgba(16, 42, 114, 0.25);
    display: flex; align-items: center; justify-content: center;
  }
  .app-icon { width: 110px; height: 110px; }
  .title {
    font-size: 60px; font-weight: 800;
    color: #102A72;
    text-shadow: 0 2px 8px rgba(26, 86, 199, 0.18);
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: 28px; font-weight: 500;
    color: #0E2B6A;
    opacity: 0.85;
  }
  .features {
    display: flex; gap: 32px; margin-top: 12px;
  }
  .feature {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255, 0.85);
    padding: 16px 26px;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .feature-icon { font-size: 32px; }
  .feature-text { font-size: 19px; font-weight: 600; color: #102A72; }
</style>
</head>
<body>
  <div class="container">
    <div class="icon-area">
      <div class="icon-box">
        <svg class="app-icon" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bg1" x1="14" y1="12" x2="116" y2="118" gradientUnits="userSpaceOnUse">
              <stop stop-color="#102A72"/>
              <stop offset="0.56" stop-color="#1A56C7"/>
              <stop offset="1" stop-color="#0FB3B8"/>
            </linearGradient>
            <linearGradient id="lid1" x1="39" y1="34" x2="88" y2="50" gradientUnits="userSpaceOnUse">
              <stop stop-color="#8CE6FF"/><stop offset="1" stop-color="#5CB7FF"/>
            </linearGradient>
            <linearGradient id="body1" x1="41" y1="46" x2="83" y2="94" gradientUnits="userSpaceOnUse">
              <stop stop-color="#FFFFFF"/><stop offset="1" stop-color="#EAF2FF"/>
            </linearGradient>
          </defs>
          <rect x="8" y="8" width="112" height="112" rx="30" fill="url(#bg1)"/>
          <rect x="49" y="28" width="30" height="8" rx="4" fill="white" opacity="0.96"/>
          <rect x="36" y="36" width="56" height="11" rx="5.5" fill="url(#lid1)"/>
          <path d="M39 44H89L84 92.5C83.6 96.4 80.3 99.4 76.4 99.4H51.6C47.7 99.4 44.4 96.4 44 92.5L39 44Z" fill="url(#body1)"/>
          <rect x="50" y="55" width="8" height="30" rx="4" fill="#6B8DF0"/>
          <rect x="60" y="55" width="8" height="30" rx="4" fill="#89A6FA"/>
          <rect x="70" y="55" width="8" height="30" rx="4" fill="#6B8DF0"/>
          <path d="M92 30L94.6 36.4L101 39L94.6 41.6L92 48L89.4 41.6L83 39L89.4 36.4L92 30Z" fill="white"/>
        </svg>
      </div>
      <div class="title">Clean Start</div>
    </div>
    <div class="subtitle">履歴・キャッシュ・Cookie をワンクリックで一掃</div>
    <div class="features">
      <div class="feature">
        <span class="feature-icon">🧹</span>
        <span class="feature-text">12 種のデータを選択削除</span>
      </div>
      <div class="feature">
        <span class="feature-icon">⏱️</span>
        <span class="feature-text">期間指定 (1時間〜全期間)</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🛡️</span>
        <span class="feature-text">2段階タップで誤操作防止</span>
      </div>
    </div>
  </div>
</body>
</html>
