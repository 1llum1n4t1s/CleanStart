<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="app_name">Clean Start</title>
  <link rel="stylesheet" href="src/popup/popup.css">
</head>
<body>
  <main class="popup-shell">
    <header class="popup-header">
      <div class="brand-copy">
        <p class="eyebrow" data-i18n="popup_brand_subtitle">History &amp; Cache Cleaner</p>
        <h1 data-i18n="app_name">Clean Start</h1>
        <p class="header-hint" data-i18n="popup_hint">Clear browser data from the current profile with one click.</p>
      </div>
    </header>

    <section class="action-panel surface-card">
      <button id="clear-btn" class="clear-button" type="button" data-state="idle">
        <span class="clear-label" data-role="label" data-i18n="popup_clear">Clear</span>
      </button>
      <div class="summary-panel">
        <p class="summary-title" data-i18n="popup_current_settings">Current Clean Target</p>
        <p class="summary-hint" data-i18n="popup_current_hint">These settings will be used when you press Clean.</p>
        <div class="summary-row">
          <span class="summary-key" data-i18n="options_time_period">Time Period</span>
          <div class="selection-tags">
            <span id="period-chip" class="selection-chip selection-chip-period"></span>
          </div>
        </div>
        <div class="summary-row">
          <span class="summary-key" data-i18n="popup_selected_data">Deletes</span>
          <div id="selection-tags" class="selection-tags"></div>
        </div>
      </div>
    </section>

    <section class="settings-card surface-card">
      <h2 class="settings-title" data-i18n="options_common">Common settings</h2>
      <ul class="plain-list compact-list" id="common-settings">
        <li>
          <label class="checkbox-row" for="autorefresh">
            <input type="checkbox" name="autorefresh" id="autorefresh">
            <span data-i18n="options_common_1">Automatically reload the active tab after clearing</span>
          </label>
        </li>
        <li>
          <label class="checkbox-row" for="clearonstartup">
            <input type="checkbox" name="clearonstartup" id="clearonstartup">
            <span data-i18n="options_common_2">Clear automatically when Chrome starts</span>
          </label>
          <p class="warning-banner" id="clearonstartup-warning" data-i18n="options_clearonstartup_warning" hidden></p>
        </li>
      </ul>
    </section>

    <section class="settings-card surface-card">
      <h2 class="settings-title" data-i18n="options_time_period">Time Period</h2>
      <ul class="plain-list time-list" id="time-period">
        <li>
          <label class="radio-row" for="last_hour">
            <input type="radio" name="timeperiod" value="last_hour" id="last_hour">
            <span data-i18n="options_last_hour">Last Hour</span>
          </label>
        </li>
        <li>
          <label class="radio-row" for="last_day">
            <input type="radio" name="timeperiod" value="last_day" id="last_day">
            <span data-i18n="options_last_day">Last Day</span>
          </label>
        </li>
        <li>
          <label class="radio-row" for="last_week">
            <input type="radio" name="timeperiod" value="last_week" id="last_week">
            <span data-i18n="options_last_week">Last Week</span>
          </label>
        </li>
        <li>
          <label class="radio-row" for="last_month">
            <input type="radio" name="timeperiod" value="last_month" id="last_month">
            <span data-i18n="options_last_month">Last Month</span>
          </label>
        </li>
        <li>
          <label class="radio-row" for="everything">
            <input type="radio" name="timeperiod" value="everything" id="everything">
            <span data-i18n="options_everything">Everything</span>
          </label>
        </li>
      </ul>
    </section>

    <section class="settings-card surface-card">
      <h2 class="settings-title" data-i18n="options_remove">Data to Remove</h2>
      <ul class="plain-list option-list" id="remove-list">
        <li class="option-item">
          <label class="checkbox-row" for="appcache">
            <input type="checkbox" name="data_to_remove" value="appcache" id="appcache">
            <span data-i18n="options_remove_appcache">App Cache</span>
          </label>
          <aside class="more-info">
            <blockquote data-i18n="options_remove_appcache_desc"></blockquote>
          </aside>
        </li>
        <li class="option-item">
          <label class="checkbox-row" for="cache">
            <input type="checkbox" name="data_to_remove" value="cache" id="cache">
            <span data-i18n="options_remove_cache">Cache</span>
          </label>
          <aside class="more-info">
            <blockquote data-i18n="options_remove_cache_desc"></blockquote>
          </aside>
        </li>
        <li class="option-item">
          <label class="checkbox-row" for="cacheStorage">
            <input type="checkbox" name="data_to_remove" value="cacheStorage" id="cacheStorage">
            <span data-i18n="options_remove_cache_storage">Cache Storage</span>
          </label>
          <aside class="more-info">
            <blockquote data-i18n="options_remove_cache_storage_desc"></blockquote>
          </aside>
        </li>
        <li class="option-item">
          <label class="checkbox-row" for="cookies">
            <input type="checkbox" name="data_to_remove" value="cookies" id="cookies">
            <span data-i18n="options_remove_cookies">Cookies</span>
          </label>
          <aside class="more-info">
            <blockquote data-i18n="options_remove_cookies_desc"></blockquote>
          </aside>
        </li>
        <li class="option-item">
          <label class="checkbox-row" for="downloads">
            <input type="checkbox" name="data_to_remove" value="downloads" id="downloads">
            <span data-i18n="options_remove_downloads">Downloads</span>
          </label>
          <aside class="more-info">
            <blockquote data-i18n="options_remove_downloads_desc"></blockquote>
          </aside>
        </li>
        <li class="option-item">
          <label class="checkbox-row" for="fileSystems">
            <input type="checkbox" name="data_to_remove" value="fileSystems" id="fileSystems">
            <span data-i18n="options_remove_fsys">File Systems</span>
          </label>
          <aside class="more-info">
            <blockquote data-i18n="options_remove_fsys_desc"></blockquote>
          </aside>
        </li>
        <li class="option-item">
          <label class="checkbox-row" for="formData">
            <input type="checkbox" name="data_to_remove" value="formData" id="formData">
            <span data-i18n="options_remove_forms">Form Data</span>
          </label>
          <aside class="more-info">
            <blockquote data-i18n="options_remove_forms_desc"></blockquote>
          </aside>
        </li>
        <li class="option-item">
          <label class="checkbox-row" for="history">
            <input type="checkbox" name="data_to_remove" value="history" id="history">
            <span data-i18n="options_remove_history">History</span>
          </label>
          <aside class="more-info">
            <blockquote data-i18n="options_remove_history_desc"></blockquote>
          </aside>
        </li>
        <li class="option-item">
          <label class="checkbox-row" for="indexedDB">
            <input type="checkbox" name="data_to_remove" value="indexedDB" id="indexedDB">
            <span data-i18n="options_remove_db">Indexed DB</span>
          </label>
          <aside class="more-info">
            <blockquote data-i18n="options_remove_db_desc"></blockquote>
          </aside>
        </li>
        <li class="option-item">
          <label class="checkbox-row" for="localStorage">
            <input type="checkbox" name="data_to_remove" value="localStorage" id="localStorage">
            <span data-i18n="options_remove_storage">Local Storage</span>
          </label>
          <aside class="more-info">
            <blockquote data-i18n="options_remove_storage_desc"></blockquote>
          </aside>
        </li>
        <li class="option-item">
          <label class="checkbox-row" for="serviceWorkers">
            <input type="checkbox" name="data_to_remove" value="serviceWorkers" id="serviceWorkers">
            <span data-i18n="options_remove_service_workers">Service Workers</span>
          </label>
          <aside class="more-info">
            <blockquote data-i18n="options_remove_service_workers_desc"></blockquote>
          </aside>
        </li>
        <li class="option-item">
          <label class="checkbox-row" for="webSQL">
            <input type="checkbox" name="data_to_remove" value="webSQL" id="webSQL">
            <span data-i18n="options_remove_sql">Web SQL</span>
          </label>
          <aside class="more-info">
            <blockquote data-i18n="options_remove_sql_desc"></blockquote>
          </aside>
        </li>
      </ul>
    </section>

    <a class="teaser" href="#" target="_blank" rel="noreferrer noopener">
      <span class="teaser-label" data-i18n="popup_label_rate">Please Rate Us!</span>
      <span class="teaser-stars" aria-hidden="true">★★★★★</span>
    </a>
  </main>

  <script src="src/shared/settings.js"></script>
  <script src="src/shared/localize.js"></script>
  <script src="src/popup/popup.js"></script>
</body>
</html>
